<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project Faceit STANDOFF 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="side-menu-overlay" id="menuOverlay"></div>
<aside class="side-menu" id="sideMenu">
    <div class="menu-profile-header" id="menuProfileBg">
        <img src="https://ui-avatars.com/api/?name=P&background=ff2a2a&color=fff" id="menuAvatar" alt="Аватар">
        <div>
            <span class="name" id="menuDisplayName" title="Перейти в профиль">Авторизуйтесь</span>
        </div>
    </div>
    
    <div class="search-container">
        <input type="text" class="menu-search" id="menuSearchInput" placeholder="Поиск пользователя...">
        <div class="search-results" id="searchResults"></div>
    </div>

    <nav class="menu-nav">
        <a href="#" id="navMain">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg> Главная 
        </a>
        <a href="#" class="dev-link"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Играть Faceit 
            <svg class="dev-icon" title="Разработка раздела" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.77 3.77z"></path></svg>
        </a>
        <a href="#" class="dev-link"><svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg> Ранги 
            <svg class="dev-icon" title="Разработка раздела" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.77 3.77z"></path></svg>
        </a>
    </nav>
    <div class="menu-footer">
        <div class="stats-footer">
            <div class="stats-row">
                <span class="blink-dot"></span> В сети: <span class="stats-val" id="menuOnlineCount">--</span>
            </div>
            <div class="stats-row">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg> Игроков: <span class="stats-val" id="menuRegisteredCount">--</span>
            </div>
        </div>
    </div>
</aside>

<div class="container">
    <header class="top-header">
        <div class="bento-menu" id="menuToggle"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
        <img src="https://i.postimg.cc/vHnb0wwv/1772819349819.png" alt="Logo" class="header-logo" id="logoToMain">
    </header>

    <div id="mainSection" class="main-layout hidden">
        <div class="premium-hero">
            <div class="pf-emblem-wrapper" id="subTrigger">
                <div class="pf-emblem-ring"></div>
                <div class="pf-emblem-text">PF</div>
            </div>

            <div class="panel">
                <div class="mh-header"><span style="color: var(--red);">НОВОСТИ</span></div>
                <div class="mh-list">
                    <div class="mh-item">Нажмите на эмблему PF, чтобы увидеть уровни подписки!</div>
                </div>
            </div>
        </div>

        <div id="subscriptionList" class="subs-container hidden">
            <h2 class="subs-title">УРОВНИ ПОДПИСКИ</h2>
            <div class="subs-grid">
                <div class="sub-card">
                    <div class="sub-badge">LITE</div>
                    <div class="sub-price">0₽</div>
                    <ul class="sub-features"><li>Статистика</li><li>Чат</li></ul>
                    <button class="btn-primary">Бесплатно</button>
                </div>
                <div class="sub-card premium">
                    <div class="sub-badge">GOLD</div>
                    <div class="sub-price">299₽</div>
                    <ul class="sub-features"><li>Золотой ник</li><li>Турниры</li></ul>
                    <button class="btn-primary">Купить</button>
                </div>
                <div class="sub-card elite">
                    <div class="sub-badge">ELITE</div>
                    <div class="sub-price">599₽</div>
                    <ul class="sub-features"><li>Все бонусы</li><li>Личный баннер</li></ul>
                    <button class="btn-primary">Купить</button>
                </div>
            </div>
        </div>
    </div>

    <div id="authSection" class="panel auth-setup-wrapper hidden">
        <h2 style="text-align: center;">Вход</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button class="btn-primary" id="btnLogin">Войти</button>
        <button class="btn-secondary" id="btnRegister" style="margin-top: 10px;">Регистрация</button>
        <div class="divider">ИЛИ</div>
        <div class="auth-circles">
            <button class="circle-btn" id="btnGoogle">G</button>
        </div>
    </div>

    <div id="profileSection" class="profile-layout hidden">
        <aside class="sidebar">
            <div class="panel sidebar-user" id="profileBgBanner">
                <div class="avatar-wrap"><img src="" id="userAvatar" class="avatar-img"></div>
                <div class="nickname-display"><span id="displayClanTag" class="clan-tag"></span><span id="displayNickname">Загрузка...</span></div>
                <div id="rankBadge" class="rank-badge">---</div>
                <button class="btn-danger" id="btnLogout" style="margin-top: 15px;">Выйти</button>
            </div>
        </aside>
        <main class="main-content">
            <div class="hero-banner" id="userBanner">
                <div class="hero-elo-box">
                    <div class="val" id="elo">0</div>
                    <div class="label">ELO</div>
                </div>
            </div>
        </main>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
