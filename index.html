<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Faceit 2.0 | Profile & Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #ff6a00;
            --dark-orange: #e65c00;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --bg-dark: #0b0b0f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at top right, #2a1610, var(--bg-dark));
            background-attachment: fixed;
            color: white;
            padding: 15px;
            min-height: 100vh;
        }

        .container { max-width: 450px; margin: auto; padding-top: 20px; }
        h1 { font-family: 'Orbitron', sans-serif; text-align: center; margin-bottom: 30px; color: var(--orange); text-shadow: 0 0 15px rgba(255, 106, 0, 0.4); }
        h2 { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; margin-bottom: 15px; }

        /* Glass Cards */
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Inputs & Buttons */
        input {
            width: 100%; padding: 14px; margin: 8px 0 15px; border-radius: 12px;
            border: 1px solid var(--border); background: rgba(0,0,0,0.4); color: white; outline: none;
            font-family: 'Montserrat', sans-serif; font-weight: 600; transition: 0.3s;
        }
        input:focus { border-color: var(--orange); box-shadow: 0 0 10px rgba(255, 106, 0, 0.3); }
        
        button {
            width: 100%; padding: 14px; border-radius: 30px; border: none;
            font-weight: 800; font-family: 'Montserrat', sans-serif; cursor: pointer; transition: 0.3s; margin-top: 5px;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-primary { background: linear-gradient(45deg, var(--orange), #ff9500); color: white; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 106, 0, 0.4); }
        .btn-google { background: white; color: #111; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
        .btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.2); }
        .btn-danger { background: #222; color: #ff4444; }
        .btn-danger:hover:not(:disabled) { background: #333; }

        /* Profile Styles */
        .profile-header { text-align: center; position: relative; padding-top: 30px; }
        .avatar-container { width: 110px; height: 110px; margin: 0 auto 15px; position: relative; }
        .avatar-img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 3px solid var(--border); transition: 0.3s;
        }
        .avatar-edit-label {
            position: absolute; bottom: 0; right: 0; background: var(--orange);
            width: 34px; height: 34px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; cursor: pointer; font-size: 16px;
            border: 3px solid var(--bg-dark); transition: 0.3s;
        }
        .avatar-edit-label:hover { transform: scale(1.1); }
        
        .nickname-display { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; font-weight: 800; letter-spacing: 1px; }
        .game-id-display { color: #aaa; font-size: 0.9rem; margin-top: 5px; font-weight: 600; }
        
        /* Rank Banner */
        .rank-badge {
            display: inline-block; padding: 4px 15px; border-radius: 20px; font-size: 0.8rem;
            font-weight: 800; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px;
            border: 1px solid;
        }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; margin-top: 20px;}
        .stat-box { background: rgba(0,0,0,0.3); padding: 15px 10px; border-radius: 15px; border: 1px solid var(--border); }
        .stat-val { display: block; font-size: 1.4rem; font-weight: 800; font-family: 'Orbitron', sans-serif; }
        .stat-label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; margin-top: 5px; font-weight: 600; }

        .hidden { display: none !important; }
        .divider { text-align: center; margin: 20px 0; font-size: 0.8rem; color: #666; font-weight: 600; }
        .btn-group { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>PROJECT FACEIT</h1>

    <div id="authSection" class="card hidden">
        <h2>Вход в систему</h2>
        
        <div id="emailForm">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Пароль">
            <button class="btn-primary" id="btnLogin">Войти</button>
            <button class="btn-secondary" id="btnRegister" style="margin-top: 10px;">Создать аккаунт</button>
        </div>

        <div class="divider">ИЛИ ЧЕРЕЗ СОЦИАЛЬНЫЕ СЕТИ</div>

        <button class="btn-google" id="btnGoogle">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Войти через Google
        </button>
    </div>

    <div id="setupSection" class="card hidden">
        <h2>Настройка профиля</h2>
        <p style="font-size: 0.85rem; color: #aaa; margin-bottom: 15px;">Заполни данные из игры Standoff 2, чтобы продолжить. Они должны быть уникальными.</p>
        
        <input type="text" id="setupNickname" placeholder="Твой Никнейм в игре">
        <input type="number" id="setupGameId" placeholder="Твой ID в игре (только цифры)">
        
        <div class="btn-group">
            <button class="btn-primary" id="btnSaveSetup">Сохранить</button>
            <button class="btn-secondary hidden" id="btnCancelSetup">Отмена</button>
        </div>
    </div>

    <div id="profileSection" class="hidden">
        <div class="card profile-header">
            <div class="avatar-container">
                <img src="" id="userAvatar" class="avatar-img">
                <label for="avatarUpload" class="avatar-edit-label">📸</label>
                <input type="file" id="avatarUpload" class="hidden" accept="image/*">
            </div>
            <div class="nickname-display" id="displayNickname">Загрузка...</div>
            <div class="game-id-display">ID: <span id="displayGameId">00000000</span></div>
            
            <div id="rankBadge" class="rank-badge">Загрузка...</div>
        </div>

        <div class="card">
            <h2>Статистика</h2>
            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-val" id="elo" style="color: var(--orange);">0</span>
                    <span class="stat-label">ELO</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val" id="wins">0</span>
                    <span class="stat-label">Победы</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val" id="losses">0</span>
                    <span class="stat-label">Поражения</span>
                </div>
            </div>
        </div>

        <button class="btn-primary" id="btnMatchForm">Отправить результат матча</button>
        <button class="btn-secondary" id="btnEditProfile" style="margin-top: 10px;">Изменить Ник/ID</button>
        <button class="btn-danger" id="btnLogout" style="margin-top: 10px;">Выйти из аккаунта</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, query, where, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    // Твой конфиг
    const firebaseConfig = {
        apiKey: "AIzaSyAuQJaKE1GS4D6GbqZfhOtTij-GXIvQF1w",
        authDomain: "project-faceit-22088.firebaseapp.com",
        projectId: "project-faceit-22088",
        storageBucket: "project-faceit-22088.appspot.com",
        messagingSenderId: "681525286192",
        appId: "1:681525286192:web:42dee0506a6c2cf32b64f5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const googleProvider = new GoogleAuthProvider();

    // DOM Элементы
    const authSec = document.getElementById('authSection');
    const profileSec = document.getElementById('profileSection');
    const setupSec = document.getElementById('setupSection');
    const btnCancelSetup = document.getElementById('btnCancelSetup');
    let isEditingProfile = false;

    // Логика рангов
    function getRankDetails(elo) {
        if (elo < 1050) return { name: "Новичок", color: "#888888", bg: "rgba(136, 136, 136, 0.1)" };
        if (elo < 1150) return { name: "Бронза", color: "#cd7f32", bg: "rgba(205, 127, 50, 0.1)" };
        if (elo < 1300) return { name: "Серебро", color: "#c0c0c0", bg: "rgba(192, 192, 192, 0.1)" };
        if (elo < 1500) return { name: "Золото", color: "#ffd700", bg: "rgba(255, 215, 0, 0.1)" };
        if (elo < 1800) return { name: "Мастер", color: "#ff6a00", bg: "rgba(255, 106, 0, 0.1)" };
        return { name: "Легенда", color: "#ff0000", bg: "rgba(255, 0, 0, 0.1)" };
    }

    // Проверка уникальности
    async function checkUnique(field, value, currentUid) {
        const q = query(collection(db, "players"), where(field, "==", value));
        const snap = await getDocs(q);
        let isUnique = true;
        snap.forEach(doc => {
            if (doc.id !== currentUid) isUnique = false;
        });
        return isUnique;
    }

    // Управление кнопками во время загрузки (чтобы не кликали дважды)
    function toggleButtonLoading(btnId, isLoading, originalText) {
        const btn = document.getElementById(btnId);
        btn.disabled = isLoading;
        btn.innerText = isLoading ? "Загрузка..." : originalText;
    }

    // РЕГИСТРАЦИЯ
    document.getElementById('btnRegister').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value.trim();
        if(pass.length < 6) return alert("Пароль минимум 6 символов!");
        
        toggleButtonLoading('btnRegister', true, 'Создать аккаунт');
        try {
            // Только создаем юзера. База данных обновится в onAuthStateChanged!
            await createUserWithEmailAndPassword(auth, email, pass);
        } catch (e) { 
            alert("Ошибка: " + e.message); 
            toggleButtonLoading('btnRegister', false, 'Создать аккаунт');
        }
    });

    // ВХОД ЕМАЙЛ
    document.getElementById('btnLogin').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value.trim();
        
        toggleButtonLoading('btnLogin', true, 'Войти');
        try { 
            await signInWithEmailAndPassword(auth, email, pass); 
        } catch (e) { 
            alert("Ошибка входа! Проверьте данные."); 
            toggleButtonLoading('btnLogin', false, 'Войти');
        }
    });

    // GOOGLE ВХОД
    document.getElementById('btnGoogle').addEventListener('click', async () => {
        try {
            await signInWithPopup(auth, googleProvider);
            // База данных обновится в onAuthStateChanged!
        } catch (e) { 
            alert("Ошибка Google: " + e.message); 
        }
    });

    // СОХРАНЕНИЕ ПРОФИЛЯ (Ник и ID)
    document.getElementById('btnSaveSetup').addEventListener('click', async () => {
        const user = auth.currentUser;
        if (!user) return;
        
        const nick = document.getElementById('setupNickname').value.trim();
        const gameId = document.getElementById('setupGameId').value.trim();

        if (nick.length < 3) return alert("Никнейм должен быть больше 3 символов.");
        if (gameId.length < 5) return alert("Введите корректный ID из игры.");

        toggleButtonLoading('btnSaveSetup', true, 'Сохранить');
        
        try {
            const isNickUnique = await checkUnique("nickname", nick, user.uid);
            const isIdUnique = await checkUnique("gameId", gameId, user.uid);

            if (!isNickUnique) throw new Error("Этот Никнейм уже занят другим игроком!");
            if (!isIdUnique) throw new Error("Этот ID уже привязан к другому аккаунту!");

            // Сохраняем данные
            await updateDoc(doc(db, "players", user.uid), { nickname: nick, gameId: gameId });
            
            // Если всё ок, сбрасываем статус редактирования и обновляем UI
            isEditingProfile = false;
            checkUserState(user); 
        } catch (e) {
            alert(e.message);
        } finally {
            toggleButtonLoading('btnSaveSetup', false, 'Сохранить');
        }
    });

    // ЗАГРУЗКА АВАТАРКИ
    document.getElementById('avatarUpload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const user = auth.currentUser;
        const storageRef = ref(storage, `avatars/${user.uid}`);
        
        try {
            document.getElementById('displayNickname').innerText = "Грузим фото...";
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);
            await updateDoc(doc(db, "players", user.uid), { avatar: url });
            document.getElementById('userAvatar').src = url;
            checkUserState(user); // Перезагружаем профиль чтобы вернуть имя
        } catch (e) { 
            alert("Ошибка загрузки! Проверьте правила Storage в Firebase."); 
            console.error(e);
            checkUserState(user); 
        }
    });

    // КНОПКА РЕДАКТИРОВАНИЯ И ОТМЕНЫ
    document.getElementById('btnEditProfile').addEventListener('click', () => {
        isEditingProfile = true;
        profileSec.classList.add('hidden');
        setupSec.classList.remove('hidden');
        btnCancelSetup.classList.remove('hidden'); // Показываем кнопку отмены
        
        document.getElementById('setupNickname').value = document.getElementById('displayNickname').innerText;
        document.getElementById('setupGameId').value = document.getElementById('displayGameId').innerText;
    });

    btnCancelSetup.addEventListener('click', () => {
        isEditingProfile = false;
        setupSec.classList.add('hidden');
        profileSec.classList.remove('hidden');
    });

    // ГЛАВНЫЙ СЛУШАТЕЛЬ АВТОРИЗАЦИИ (Здесь всё собирается воедино)
    async function checkUserState(user) {
        if (user) {
            authSec.classList.add('hidden');
            const userRef = doc(db, "players", user.uid);
            let snap = await getDoc(userRef);
            
            // Если это совершенно новый аккаунт, создаем ему базовую статистику тут!
            if (!snap.exists()) {
                await setDoc(userRef, { 
                    email: user.email, 
                    elo: 1000, 
                    wins: 0, 
                    losses: 0,
                    avatar: user.photoURL || null 
                });
                snap = await getDoc(userRef); // Запрашиваем созданный документ
            }
            
            const data = snap.data();
            
            // Если нет Ника или ID — кидаем на страницу настройки
            if (!data.nickname || !data.gameId) {
                profileSec.classList.add('hidden');
                setupSec.classList.remove('hidden');
                btnCancelSetup.classList.add('hidden'); // Отменить нельзя, это обязательный шаг
            } else {
                // Все данные есть — показываем профиль
                setupSec.classList.add('hidden');
                profileSec.classList.remove('hidden');
                
                document.getElementById('displayNickname').innerText = data.nickname;
                document.getElementById('displayGameId').innerText = data.gameId;
                document.getElementById('elo').innerText = data.elo;
                document.getElementById('wins').innerText = data.wins;
                document.getElementById('losses').innerText = data.losses;
                
                // Установка умной аватарки (с первой буквой ника, если фото нет)
                const safeNick = encodeURIComponent(data.nickname || 'Player');
                const defaultAvatar = `https://ui-avatars.com/api/?name=${safeNick}&background=ff6a00&color=fff&font-size=0.4`;
                document.getElementById('userAvatar').src = data.avatar || defaultAvatar;
                
                // Отрисовка Баннера Ранга
                const rank = getRankDetails(data.elo);
                const badge = document.getElementById('rankBadge');
                badge.innerText = rank.name;
                badge.style.color = rank.color;
                badge.style.borderColor = rank.color;
                badge.style.backgroundColor = rank.bg;
                
                // Подсветка рамки аватарки
                document.getElementById('userAvatar').style.borderColor = rank.color;
                
                // Сбрасываем кнопки в нормальное состояние (на случай если висела загрузка)
                toggleButtonLoading('btnLogin', false, 'Войти');
                toggleButtonLoading('btnRegister', false, 'Создать аккаунт');
            }
        } else {
            authSec.classList.remove('hidden');
            profileSec.classList.add('hidden');
            setupSec.classList.add('hidden');
        }
    }

    onAuthStateChanged(auth, checkUserState);
    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));
</script>
</body>
</html>
