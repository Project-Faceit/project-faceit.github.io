<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Faceit 2.0 | Profile & Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #ff6a00;
            --dark-orange: #e65c00;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at top right, #2a1610, #0b0b0f);
            color: white;
            padding: 15px;
            min-height: 100vh;
        }

        .container { max-width: 450px; margin: auto; }
        h1 { font-family: 'Orbitron', sans-serif; text-align: center; margin: 20px 0; color: var(--orange); }

        /* Glass Cards */
        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }

        /* Inputs & Buttons */
        input {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px;
            border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: white; outline: none;
        }
        button {
            width: 100%; padding: 14px; border-radius: 30px; border: none;
            font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-primary { background: linear-gradient(45deg, var(--orange), #ff9500); color: white; }
        .btn-google { background: white; color: #444; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-tg { background: #0088cc; color: white; }

        /* Profile Styles */
        .profile-header { text-align: center; position: relative; }
        .avatar-container {
            width: 100px; height: 100px; margin: 0 auto 15px; position: relative;
        }
        .avatar-img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 3px solid var(--orange); box-shadow: 0 0 15px rgba(255, 106, 0, 0.4);
        }
        .avatar-edit-label {
            position: absolute; bottom: 0; right: 0; background: var(--orange);
            width: 30px; height: 30px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; cursor: pointer; font-size: 12px;
        }
        .nickname-display { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; margin-bottom: 5px; }
        
        .hidden { display: none !important; }
        .social-divider { text-align: center; margin: 15px 0; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h1>PROJECT FACEIT</h1>

    <div id="authSection" class="card">
        <h2 style="margin-bottom: 15px; font-size: 1.2rem;">Присоединяйся</h2>
        
        <div id="emailForm">
            <input type="text" id="regNickname" placeholder="Твой Никнейм (для новых)">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Пароль">
            <button class="btn-primary" id="btnRegister">Создать аккаунт</button>
            <button style="background:none; color: var(--orange); font-size: 0.9rem;" id="toggleLogin">Уже есть аккаунт? Войти</button>
        </div>

        <div class="social-divider">ИЛИ ВОЙТИ ЧЕРЕЗ</div>

        <button class="btn-google" id="btnGoogle">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Google
        </button>
        <button class="btn-tg" id="btnTelegram">Telegram</button>
    </div>

    <div id="profileSection" class="hidden">
        <div class="card profile-header">
            <div class="avatar-container">
                <img src="https://via.placeholder.com/100" id="userAvatar" class="avatar-img">
                <label for="avatarUpload" class="avatar-edit-label">✎</label>
                <input type="file" id="avatarUpload" class="hidden" accept="image/*">
            </div>
            <div class="nickname-display" id="displayNickname">Player</div>
            <div style="color: #aaa; font-size: 0.9rem;" id="displayEmail">email@example.com</div>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 10px;">Статистика</h3>
            <div style="display: flex; justify-content: space-around; text-align: center;">
                <div><div style="color: var(--orange); font-weight: 800;" id="elo">1000</div>ELO</div>
                <div><div style="font-weight: 800;" id="wins">0</div>Wins</div>
                <div><div style="font-weight: 800;" id="losses">0</div>Losses</div>
            </div>
        </div>

        <button class="btn-primary" id="btnMatchForm">Отправить результат матча</button>
        <button style="background: #333; color: white;" id="btnLogout">Выйти</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
        getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, 
        signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAuQJaKE1GS4D6GbqZfhOtTij-GXIvQF1w",
        authDomain: "project-faceit-22088.firebaseapp.com",
        projectId: "project-faceit-22088",
        storageBucket: "project-faceit-22088.appspot.com",
        messagingSenderId: "681525286192",
        appId: "1:681525286192:web:42dee0506a6c2cf32b64f5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const googleProvider = new GoogleAuthProvider();

    // --- ЛОГИКА АВТОРИЗАЦИИ ---

    // Регистрация с никнеймом
    document.getElementById('btnRegister').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const nick = document.getElementById('regNickname').value;

        if(!nick) return alert("Введите никнейм!");

        try {
            const res = await createUserWithEmailAndPassword(auth, email, pass);
            await setDoc(doc(db, "players", res.user.uid), {
                nickname: nick,
                email: email,
                avatar: "https://via.placeholder.com/100",
                elo: 1000, wins: 0, losses: 0
            });
        } catch (e) { alert(e.message); }
    });

    // Вход через Google
    document.getElementById('btnGoogle').addEventListener('click', async () => {
        try {
            const res = await signInWithPopup(auth, googleProvider);
            const user = res.user;
            
            // Проверяем, есть ли такой игрок в базе
            const userDoc = await getDoc(doc(db, "players", user.uid));
            if (!userDoc.exists()) {
                // Если новый — создаем запись
                await setDoc(doc(db, "players", user.uid), {
                    nickname: user.displayName || "New Player",
                    email: user.email,
                    avatar: user.photoURL || "https://via.placeholder.com/100",
                    elo: 1000, wins: 0, losses: 0
                });
            }
        } catch (e) { alert("Ошибка Google: " + e.message); }
    });

    // Telegram (Заглушка)
    document.getElementById('btnTelegram').addEventListener('click', () => {
        alert("Вход через Telegram в разработке. Требуется настройка BotFather.");
    });

    // --- ЛОГИКА ПРОФИЛЯ ---

    // Загрузка аватара
    document.getElementById('avatarUpload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const user = auth.currentUser;
        const storageRef = ref(storage, `avatars/${user.uid}`);
        
        try {
            alert("Загрузка аватара...");
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);
            
            // Обновляем в базе и на странице
            await updateDoc(doc(db, "players", user.uid), { avatar: url });
            document.getElementById('userAvatar').src = url;
            alert("Аватар обновлен!");
        } catch (e) { alert("Ошибка загрузки: " + e.message); }
    });

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('profileSection').classList.remove('hidden');
            
            const snap = await getDoc(doc(db, "players", user.uid));
            if (snap.exists()) {
                const data = snap.data();
                document.getElementById('displayNickname').innerText = data.nickname;
                document.getElementById('displayEmail').innerText = data.email;
                document.getElementById('userAvatar').src = data.avatar;
                document.getElementById('elo').innerText = data.elo;
                document.getElementById('wins').innerText = data.wins;
                document.getElementById('losses').innerText = data.losses;
            }
        } else {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('profileSection').classList.add('hidden');
        }
    });

    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));
</script>
</body>
</html>
