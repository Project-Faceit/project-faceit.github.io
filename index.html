<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Faceit 2.0 | Profile & Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #ff6a00;
            --dark-orange: #e65c00;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --bg-dark: #0b0b0f;
            --tg-blue: #2AABEE;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at top right, #2a1610, var(--bg-dark));
            background-attachment: fixed;
            color: white;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container { width: 100%; max-width: 450px; margin: auto; }
        h1 { font-family: 'Orbitron', sans-serif; text-align: center; margin-bottom: 25px; color: var(--orange); text-shadow: 0 0 15px rgba(255, 106, 0, 0.4); }
        h2 { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; margin-bottom: 15px; text-align: center; }

        /* Glass Cards */
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Inputs & Buttons */
        input {
            width: 100%; padding: 14px; margin: 8px 0 15px; border-radius: 12px;
            border: 1px solid var(--border); background: rgba(0,0,0,0.4); color: white; outline: none;
            font-family: 'Montserrat', sans-serif; font-weight: 600; transition: 0.3s;
        }
        input:focus { border-color: var(--orange); box-shadow: 0 0 10px rgba(255, 106, 0, 0.3); }
        
        button {
            width: 100%; padding: 14px; border-radius: 30px; border: none;
            font-weight: 800; font-family: 'Montserrat', sans-serif; cursor: pointer; transition: 0.3s; margin-top: 5px;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-primary { background: linear-gradient(45deg, var(--orange), #ff9500); color: white; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 106, 0, 0.4); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
        .btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.2); }
        .btn-danger { background: rgba(255, 68, 68, 0.1); color: #ff4444; border: 1px solid rgba(255, 68, 68, 0.3); }
        .btn-danger:hover:not(:disabled) { background: #ff4444; color: white; }

        /* Circle Auth Buttons */
        .auth-circles { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .circle-btn {
            width: 55px; height: 55px; border-radius: 50%; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); padding: 0;
        }
        .circle-btn:hover { transform: translateY(-3px) scale(1.05); }
        .circle-google { background: white; }
        .circle-tg { background: var(--tg-blue); }
        .circle-btn svg { width: 26px; height: 26px; }

        /* Profile Styles */
        .profile-banner {
            height: 120px;
            margin: -25px -25px 50px -25px;
            border-radius: 20px 20px 0 0;
            background-color: #1a1a24;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .profile-header { text-align: center; position: relative; padding-top: 0; }
        .avatar-container { 
            width: 110px; height: 110px; position: absolute; 
            top: 60px; left: 50%; transform: translateX(-50%);
            z-index: 2;
        }
        .avatar-img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 4px solid var(--bg-dark); transition: 0.3s; background: var(--bg-dark);
        }
        
        .user-info { margin-top: 65px; }
        .nickname-display { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; font-weight: 800; letter-spacing: 1px; }
        .game-id-display { color: #aaa; font-size: 0.9rem; margin-top: 5px; font-weight: 600; }
        
        /* Rank Banner */
        .rank-badge {
            display: inline-block; padding: 6px 18px; border-radius: 20px; font-size: 0.8rem;
            font-weight: 800; margin-top: 12px; text-transform: uppercase; letter-spacing: 1px;
            border: 1px solid; box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; margin-top: 15px;}
        .stat-box { background: rgba(0,0,0,0.4); padding: 15px 10px; border-radius: 15px; border: 1px solid var(--border); }
        .stat-val { display: block; font-size: 1.4rem; font-weight: 800; font-family: 'Orbitron', sans-serif; }
        .stat-label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; margin-top: 5px; font-weight: 600; }

        /* Social Links */
        .social-links { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
        .social-link { color: #fff; opacity: 0.5; transition: 0.3s; text-decoration: none; }
        .social-link:hover { opacity: 1; color: var(--orange); transform: scale(1.1); }
        .social-link svg { width: 24px; height: 24px; fill: currentColor; }

        .hidden { display: none !important; }
        .divider { text-align: center; margin: 25px 0 15px; font-size: 0.8rem; color: #666; font-weight: 600; position: relative; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 25%; height: 1px; background: #333; }
        .divider::before { left: 0; } .divider::after { right: 0; }
        .btn-group { display: flex; gap: 10px; }
        .input-group-title { font-size: 0.85rem; color: var(--orange); margin-bottom: 5px; font-weight: 600; margin-top: 15px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h1>PROJECT FACEIT</h1>

    <div id="authSection" class="card hidden">
        <h2>Вход в систему</h2>
        
        <div id="emailForm">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Пароль">
            <button class="btn-primary" id="btnLogin">Войти</button>
            <button class="btn-secondary" id="btnRegister">Создать аккаунт</button>
        </div>

        <div class="divider">ИЛИ ВОЙТИ ЧЕРЕЗ</div>

        <div class="auth-circles">
            <button class="circle-btn circle-google" id="btnGoogle" title="Google">
                <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.7 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            </button>
            <button class="circle-btn circle-tg" id="btnTelegram" title="Telegram">
                <svg viewBox="0 0 24 24"><path fill="#FFF" d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.89 8.24l-1.97 9.28c-.14.65-.53.81-1.07.51l-2.96-2.18-1.43 1.38c-.16.16-.29.29-.6.29l.21-3.02 5.5-4.97c.24-.22-.05-.34-.37-.13l-6.79 4.27-2.93-.92c-.64-.2-.65-.64.13-.95l11.45-4.41c.53-.2.99.11.83.85z"/></svg>
            </button>
        </div>
    </div>

    <div id="setupSection" class="card hidden">
        <h2 id="setupTitle">Настройка профиля</h2>
        <p style="font-size: 0.85rem; color: #aaa; margin-bottom: 15px;">Заполни данные из игры, чтобы продолжить. Они должны быть уникальными.</p>
        
        <div class="input-group-title">Обязательно</div>
        <input type="text" id="setupNickname" placeholder="Твой Никнейм в игре">
        <input type="number" id="setupGameId" placeholder="Твой ID в игре (только цифры)">
        
        <div class="input-group-title">Внешний вид (Ссылки на фото)</div>
        <input type="url" id="setupAvatarUrl" placeholder="URL Аватарки (https://...)">
        <input type="url" id="setupBannerUrl" placeholder="URL Баннера (https://...)">

        <div class="input-group-title">Социальные сети (Ссылки)</div>
        <input type="url" id="setupTgUrl" placeholder="Ссылка на Telegram">
        <input type="url" id="setupVkUrl" placeholder="Ссылка на VK">
        
        <div class="btn-group" style="margin-top: 15px;">
            <button class="btn-primary" id="btnSaveSetup">Сохранить</button>
            <button class="btn-secondary hidden" id="btnCancelSetup">Отмена</button>
        </div>
    </div>

    <div id="profileSection" class="hidden">
        <div class="card profile-header">
            <div class="profile-banner" id="userBanner"></div>
            
            <div class="avatar-container">
                <img src="" id="userAvatar" class="avatar-img">
            </div>
            
            <div class="user-info">
                <div class="nickname-display" id="displayNickname">Загрузка...</div>
                <div class="game-id-display">ID: <span id="displayGameId">00000000</span></div>
                <div id="rankBadge" class="rank-badge">Загрузка...</div>
                
                <div class="social-links" id="socialLinksContainer">
                    </div>
            </div>
        </div>

        <div class="card">
            <h2>Статистика</h2>
            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-val" id="elo" style="color: var(--orange);">0</span>
                    <span class="stat-label">ELO</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val" id="wins">0</span>
                    <span class="stat-label">Победы</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val" id="losses">0</span>
                    <span class="stat-label">Поражения</span>
                </div>
            </div>
        </div>

        <button class="btn-primary" id="btnMatchForm">Отправить результат матча</button>
        <button class="btn-secondary" id="btnEditProfile">Изменить профиль</button>
        <button class="btn-danger" id="btnLogout">Выйти из аккаунта</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, query, where, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Твой конфиг
    const firebaseConfig = {
        apiKey: "AIzaSyAuQJaKE1GS4D6GbqZfhOtTij-GXIvQF1w",
        authDomain: "project-faceit-22088.firebaseapp.com",
        projectId: "project-faceit-22088",
        storageBucket: "project-faceit-22088.appspot.com",
        messagingSenderId: "681525286192",
        appId: "1:681525286192:web:42dee0506a6c2cf32b64f5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    // DOM Элементы
    const authSec = document.getElementById('authSection');
    const profileSec = document.getElementById('profileSection');
    const setupSec = document.getElementById('setupSection');
    const btnCancelSetup = document.getElementById('btnCancelSetup');
    let isEditingProfile = false;

    // Логика рангов
    function getRankDetails(elo) {
        if (elo < 1050) return { name: "Новичок", color: "#888888", bg: "rgba(136, 136, 136, 0.1)" };
        if (elo < 1150) return { name: "Бронза", color: "#cd7f32", bg: "rgba(205, 127, 50, 0.1)" };
        if (elo < 1300) return { name: "Серебро", color: "#c0c0c0", bg: "rgba(192, 192, 192, 0.1)" };
        if (elo < 1500) return { name: "Золото", color: "#ffd700", bg: "rgba(255, 215, 0, 0.1)" };
        if (elo < 1800) return { name: "Мастер", color: "#ff6a00", bg: "rgba(255, 106, 0, 0.1)" };
        return { name: "Легенда", color: "#ff0000", bg: "rgba(255, 0, 0, 0.1)" };
    }

    // Проверка уникальности
    async function checkUnique(field, value, currentUid) {
        const q = query(collection(db, "players"), where(field, "==", value));
        const snap = await getDocs(q);
        let isUnique = true;
        snap.forEach(doc => { if (doc.id !== currentUid) isUnique = false; });
        return isUnique;
    }

    function toggleButtonLoading(btnId, isLoading, originalText) {
        const btn = document.getElementById(btnId);
        btn.disabled = isLoading;
        btn.innerText = isLoading ? "..." : originalText;
    }

    // РЕГИСТРАЦИЯ с подтверждением почты
    document.getElementById('btnRegister').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value.trim();
        if(pass.length < 6) return alert("Пароль минимум 6 символов!");
        
        toggleButtonLoading('btnRegister', true, 'Создать аккаунт');
        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, pass);
            await sendEmailVerification(userCred.user);
            alert("✅ Успешно! Мы отправили письмо на твою почту. Перейди по ссылке в письме для активации аккаунта, а затем войди.");
            await signOut(auth); // Разлогиниваем, пока не подтвердит
        } catch (e) { 
            alert("Ошибка: " + e.message); 
        } finally {
            toggleButtonLoading('btnRegister', false, 'Создать аккаунт');
        }
    });

    // ВХОД ЕМАЙЛ с проверкой подтверждения
    document.getElementById('btnLogin').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value.trim();
        
        toggleButtonLoading('btnLogin', true, 'Войти');
        try { 
            const userCred = await signInWithEmailAndPassword(auth, email, pass); 
            if (!userCred.user.emailVerified) {
                alert("⚠️ Твоя почта еще не подтверждена! Проверь входящие (и папку Спам) и перейди по ссылке.");
                await signOut(auth);
            }
        } catch (e) { 
            alert("Ошибка входа! Проверьте данные."); 
        } finally {
            toggleButtonLoading('btnLogin', false, 'Войти');
        }
    });

    // GOOGLE ВХОД
    document.getElementById('btnGoogle').addEventListener('click', async () => {
        try { await signInWithPopup(auth, googleProvider); } 
        catch (e) { alert("Ошибка Google: " + e.message); }
    });

    // TELEGRAM ВХОД (Заглушка)
    document.getElementById('btnTelegram').addEventListener('click', () => {
        alert("Вход через Telegram требует подключения backend'a (Firebase Functions) для валидации токена. Кнопка готова к работе, как только настроим серверную часть!");
    });

    // СОХРАНЕНИЕ ПРОФИЛЯ
    document.getElementById('btnSaveSetup').addEventListener('click', async () => {
        const user = auth.currentUser;
        if (!user) return;
        
        const nick = document.getElementById('setupNickname').value.trim();
        const gameId = document.getElementById('setupGameId').value.trim();
        const avatarUrl = document.getElementById('setupAvatarUrl').value.trim();
        const bannerUrl = document.getElementById('setupBannerUrl').value.trim();
        const tgUrl = document.getElementById('setupTgUrl').value.trim();
        const vkUrl = document.getElementById('setupVkUrl').value.trim();

        if (nick.length < 3) return alert("Никнейм должен быть больше 3 символов.");
        if (gameId.length < 5) return alert("Введите корректный ID из игры.");

        toggleButtonLoading('btnSaveSetup', true, 'Сохранить');
        
        try {
            const isNickUnique = await checkUnique("nickname", nick, user.uid);
            const isIdUnique = await checkUnique("gameId", gameId, user.uid);

            if (!isNickUnique) throw new Error("Этот Никнейм уже занят другим игроком!");
            if (!isIdUnique) throw new Error("Этот ID уже привязан к другому аккаунту!");

            await updateDoc(doc(db, "players", user.uid), { 
                nickname: nick, 
                gameId: gameId,
                avatar: avatarUrl || user.photoURL || null,
                banner: bannerUrl || null,
                socialTg: tgUrl || null,
                socialVk: vkUrl || null
            });
            
            isEditingProfile = false;
            checkUserState(user); 
        } catch (e) {
            alert(e.message);
        } finally {
            toggleButtonLoading('btnSaveSetup', false, 'Сохранить');
        }
    });

    // КНОПКА РЕДАКТИРОВАНИЯ И ОТМЕНЫ
    document.getElementById('btnEditProfile').addEventListener('click', async () => {
        isEditingProfile = true;
        profileSec.classList.add('hidden');
        setupSec.classList.remove('hidden');
        btnCancelSetup.classList.remove('hidden');
        document.getElementById('setupTitle').innerText = "Редактирование";
        
        const snap = await getDoc(doc(db, "players", auth.currentUser.uid));
        if(snap.exists()) {
            const d = snap.data();
            document.getElementById('setupNickname').value = d.nickname || '';
            document.getElementById('setupGameId').value = d.gameId || '';
            document.getElementById('setupAvatarUrl').value = d.avatar && !d.avatar.includes('ui-avatars') ? d.avatar : '';
            document.getElementById('setupBannerUrl').value = d.banner || '';
            document.getElementById('setupTgUrl').value = d.socialTg || '';
            document.getElementById('setupVkUrl').value = d.socialVk || '';
        }
    });

    btnCancelSetup.addEventListener('click', () => {
        isEditingProfile = false;
        setupSec.classList.add('hidden');
        profileSec.classList.remove('hidden');
    });

    // ГЛАВНЫЙ СЛУШАТЕЛЬ АВТОРИЗАЦИИ
    async function checkUserState(user) {
        if (user && user.emailVerified === false && user.providerData[0].providerId === 'password') {
            // Если почта не подтверждена, не пускаем
            return;
        }

        if (user) {
            authSec.classList.add('hidden');
            const userRef = doc(db, "players", user.uid);
            let snap = await getDoc(userRef);
            
            if (!snap.exists()) {
                await setDoc(userRef, { 
                    email: user.email, 
                    elo: 1000, wins: 0, losses: 0,
                    avatar: user.photoURL || null 
                });
                snap = await getDoc(userRef); 
            }
            
            const data = snap.data();
            
            if (!data.nickname || !data.gameId) {
                profileSec.classList.add('hidden');
                setupSec.classList.remove('hidden');
                btnCancelSetup.classList.add('hidden');
                document.getElementById('setupTitle').innerText = "Настройка профиля";
            } else {
                setupSec.classList.add('hidden');
                profileSec.classList.remove('hidden');
                
                document.getElementById('displayNickname').innerText = data.nickname;
                document.getElementById('displayGameId').innerText = data.gameId;
                document.getElementById('elo').innerText = data.elo;
                document.getElementById('wins').innerText = data.wins;
                document.getElementById('losses').innerText = data.losses;
                
                // Аватар и Баннер
                const safeNick = encodeURIComponent(data.nickname || 'Player');
                const defaultAvatar = `https://ui-avatars.com/api/?name=${safeNick}&background=ff6a00&color=fff&font-size=0.4`;
                document.getElementById('userAvatar').src = data.avatar || defaultAvatar;
                
                if(data.banner) {
                    document.getElementById('userBanner').style.backgroundImage = `url('${data.banner}')`;
                } else {
                    document.getElementById('userBanner').style.backgroundImage = "none";
                }

                // Соцсети
                const socialsContainer = document.getElementById('socialLinksContainer');
                socialsContainer.innerHTML = '';
                if(data.socialTg) {
                    socialsContainer.innerHTML += `<a href="${data.socialTg}" target="_blank" class="social-link" title="Telegram"><svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.89 8.24l-1.97 9.28c-.14.65-.53.81-1.07.51l-2.96-2.18-1.43 1.38c-.16.16-.29.29-.6.29l.21-3.02 5.5-4.97c.24-.22-.05-.34-.37-.13l-6.79 4.27-2.93-.92c-.64-.2-.65-.64.13-.95l11.45-4.41c.53-.2.99.11.83.85z"/></svg></a>`;
                }
                if(data.socialVk) {
                    socialsContainer.innerHTML += `<a href="${data.socialVk}" target="_blank" class="social-link" title="VK"><svg viewBox="0 0 24 24"><path d="M23.1 7.2c.2-.6 0-1.1-.9-1.1h-2.6c-.7 0-1.1.4-1.4.9 0 0-1.3 3.2-3.2 5.3-.6.6-.9.8-1.3.8-.2 0-.4-.2-.4-.7V7.1c0-.7-.2-1.1-.8-1.1h-4.4c-.4 0-.7.3-.7.6 0 .6 1 .8 1.1 2.6v3.9c0 .9-.2 1.1-.5 1.1-.9 0-3.3-3.2-4.6-6.9-.3-.8-.6-1.1-1.3-1.1H.5c-.8 0-.9.4-.9.9 0 1 1.3 6.1 6.1 12.8 3.2 4.6 7.6 7.1 11.6 7.1 2.4 0 2.7-.5 2.7-1.4V20c0-.8.2-1 .7-1 .4 0 1.1.2 2.7 1.7 1.9 1.9 2.2 2.8 3.3 2.8h2.6c.8 0 1.2-.4 1-.1-.3-.6-1.5-2.2-3-3.8-1.3-1.5-1.7-2.1-2.2-2.8-.6-.7-.4-1 0-1.6 0-.1 2.9-4.1 3.2-5z"/></svg></a>`;
                }
                
                // Ранг
                const rank = getRankDetails(data.elo);
                const badge = document.getElementById('rankBadge');
                badge.innerText = rank.name;
                badge.style.color = rank.color;
                badge.style.borderColor = rank.color;
                badge.style.backgroundColor = rank.bg;
                document.getElementById('userAvatar').style.borderColor = rank.color;
            }
        } else {
            authSec.classList.remove('hidden');
            profileSec.classList.add('hidden');
            setupSec.classList.add('hidden');
        }
    }

    onAuthStateChanged(auth, checkUserState);
    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));
</script>
</body>
</html>
